<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>洛克王国世界 — 完整攻略</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#7c3aed', 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9' },
            darkbg: '#0f172a',
            darkcard: '#1e293b',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    [data-theme="dark"] body { background: #0f172a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 3px; }
    .toc-link.active { color: #7c3aed; font-weight: 600; }
    [data-theme="dark"] .toc-link.active { color: #a78bfa; }
    .search-highlight { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; }
    [data-theme="dark"] .search-highlight { background: #854d0e; color: #fef08a; }
    .guide-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #7c3aed; }
    [data-theme="dark"] .guide-content h2 { border-bottom-color: #a78bfa; }
    .guide-content h3 { font-size: 1.2rem; font-weight: 600; margin: 1.5rem 0 0.75rem; color: #7c3aed; }
    [data-theme="dark"] .guide-content h3 { color: #a78bfa; }
    .guide-content h4 { font-size: 1.05rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .guide-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    .guide-content th { background: #7c3aed; color: white; padding: 0.5rem 0.75rem; text-align: left; }
    [data-theme="dark"] .guide-content th { background: #5b21b6; }
    .guide-content td { padding: 0.4rem 0.75rem; border-bottom: 1px solid #e2e8f0; }
    [data-theme="dark"] .guide-content td { border-bottom-color: #334155; }
    .guide-content tr:hover td { background: #f5f3ff; }
    [data-theme="dark"] .guide-content tr:hover td { background: #1e293b; }
    .guide-content blockquote { border-left: 4px solid #7c3aed; padding: 0.5rem 1rem; margin: 1rem 0; background: #f5f3ff; border-radius: 0 8px 8px 0; }
    [data-theme="dark"] .guide-content blockquote { background: #1e293b; border-left-color: #a78bfa; }
    .guide-content code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; }
    [data-theme="dark"] .guide-content code { background: #334155; }
    .guide-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; }
    .guide-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
    [data-theme="dark"] .guide-content hr { border-top-color: #334155; }
    .guide-content ul, .guide-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .guide-content li { margin: 0.3rem 0; }
    .chat-bubble-user { background: #7c3aed; color: white; border-radius: 18px 18px 4px 18px; }
    .chat-bubble-ai { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 4px; }
    [data-theme="dark"] .chat-bubble-ai { background: #334155; color: #e2e8f0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .slide-in-right { animation: slideInRight 0.3s ease; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .typing-dot { animation: pulse 1.4s infinite; display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <!-- 顶部导航 -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-darkbg/90 backdrop-blur border-b border-gray-200 dark:border-slate-700 shadow-sm">
    <div class="flex items-center justify-between px-4 h-14">
      <div class="flex items-center gap-3">
        <button id="btn-toc-toggle" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700" title="目录">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-bold text-lg text-primary">🏰 洛克王国世界攻略</span>
        <span class="text-xs bg-primary/10 text-primary px-2 py-0.5 rounded-full hidden sm:inline">v1.0</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative hidden sm:block">
          <input id="search-input" type="text" placeholder="搜索攻略内容..." class="w-48 lg:w-64 px-3 py-1.5 text-sm border border-gray-300 dark:border-slate-600 rounded-full bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
          <svg class="w-4 h-4 absolute right-3 top-2 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </div>
        <button id="btn-theme" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700" title="切换主题">
          <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button id="btn-chat-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-slate-700 relative" title="AI 助手">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span id="chat-badge" class="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center hidden">1</span>
        </button>
      </div>
    </div>
    <div class="sm:hidden px-4 pb-3">
      <input id="search-input-mobile" type="text" placeholder="搜索攻略内容..." class="w-full px-3 py-1.5 text-sm border border-gray-300 dark:border-slate-600 rounded-full bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
    </div>
  </header>

  <div class="flex relative">
    <!-- 侧栏目录 -->
    <aside id="sidebar-toc" class="fixed lg:sticky top-14 left-0 z-40 w-64 h-[calc(100vh-3.5rem)] bg-white dark:bg-darkbg border-r border-gray-200 dark:border-slate-700 overflow-y-auto p-4 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-sm text-gray-500 dark:text-slate-400 uppercase tracking-wider">目录导航</h3>
        <button id="btn-toc-close" class="lg:hidden p-1 rounded hover:bg-gray-100 dark:hover:bg-slate-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav id="toc-nav" class="space-y-0.5 text-sm"></nav>
    </aside>

    <div id="toc-overlay" class="fixed inset-0 bg-black/40 z-30 lg:hidden hidden"></div>

    <!-- 主内容区 -->
    <main class="flex-1 min-w-0 px-4 sm:px-8 py-6 max-w-4xl mx-auto">
      <div id="search-status" class="hidden mb-4 p-3 bg-primary/10 text-primary rounded-lg text-sm flex items-center justify-between">
        <span id="search-status-text"></span>
        <button id="btn-clear-search" class="text-primary hover:underline text-xs">清除搜索</button>
      </div>
      <article id="guide-content" class="guide-content"></article>
      <div id="search-empty" class="hidden text-center py-12 text-gray-400">
        <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6"/></svg>
        <p>没有找到匹配的内容</p>
        <p class="text-sm mt-1">试试其他关键词吧</p>
      </div>
    </main>
  </div>

  <!-- AI 对话侧边栏 -->
  <div id="chat-panel" class="fixed top-0 right-0 z-50 w-full sm:w-96 h-full bg-white dark:bg-darkbg shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-slate-700 bg-primary text-white">
      <div class="flex items-center gap-2">
        <span class="text-xl">🫘</span>
        <div>
          <h3 class="font-bold text-sm">豆包 AI 助手</h3>
          <p class="text-xs opacity-80">洛克王国世界专属问答</p>
        </div>
      </div>
      <button id="btn-chat-close" class="p-1.5 rounded-lg hover:bg-white/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
      <div class="fade-in">
        <div class="flex items-start gap-2">
          <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-sm flex-shrink-0">🫘</div>
          <div class="chat-bubble-ai p-3 text-sm max-w-[85%]">
            你好！我是豆包 AI 助手，用公开代理模式为你服务～你可以问我任何关于洛克王国世界的问题，比如精灵推荐、配队建议、养成路线等。
          </div>
        </div>
      </div>
    </div>

    <!-- API 设置 -->
    <div id="chat-settings" class="hidden border-t border-gray-200 dark:border-slate-700 p-3 space-y-2">
      <div class="text-xs text-gray-500">豆包 API 设置（火山引擎）</div>
      <input id="input-api-key" type="password" placeholder="输入 API Key..." class="w-full px-3 py-1.5 text-xs border border-gray-300 dark:border-slate-600 rounded-lg bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
      <input id="input-api-endpoint" type="text" value="https://ark.cn-beijing.volces.com/api/v3/chat/completions" placeholder="API 地址" class="w-full px-3 py-1.5 text-xs border border-gray-300 dark:border-slate-600 rounded-lg bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
      <input id="input-model" type="text" value="doubao-1.5-pro-32k" placeholder="模型名称" class="w-full px-3 py-1.5 text-xs border border-gray-300 dark:border-slate-600 rounded-lg bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
      <div class="border-t border-gray-200 dark:border-slate-600 pt-2">
        <div class="text-xs text-gray-500 mb-1">🌐 公开 CORS 代理（解决跨域问题）</div>
        <input id="input-proxy-url" type="text" value="https://api.allorigins.win/raw?url=" placeholder="留空则直连（可能跨域报错）" class="w-full px-3 py-1.5 text-xs border border-green-300 dark:border-green-600 rounded-lg bg-green-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-green-400/50" />
        <div class="text-xs text-gray-400 mt-1">留空则直连（可能跨域报错）。可填拼接式代理，如：<code class="text-green-600">https://cors-anywhere.herokuapp.com/</code>（需先访问该网址点击 Request temporary access）</div>
      </div>
      <button id="btn-save-settings" class="w-full px-3 py-1.5 bg-primary text-white text-xs rounded-lg hover:bg-primary/90">保存设置</button>
      <div class="text-xs text-gray-400">在 <a href="https://console.volcengine.com" target="_blank" class="text-primary">火山引擎控制台</a> 获取 API Key</div>
    </div>

    <div class="p-3 border-t border-gray-200 dark:border-slate-700">
      <div class="flex items-center gap-2 mb-2">
        <button id="btn-toggle-settings" class="text-xs text-gray-400 hover:text-primary">⚙️ API 设置</button>
        <div id="api-status" class="text-xs text-gray-400 ml-auto">未配置</div>
      </div>
      <div class="flex gap-2">
        <input id="chat-input" type="text" placeholder="输入你的问题..." class="flex-1 px-3 py-2 text-sm border border-gray-300 dark:border-slate-600 rounded-full bg-gray-50 dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary/50" />
        <button id="btn-send" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center hover:bg-primary/90 flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <button id="btn-scroll-top" class="fixed bottom-6 right-6 w-10 h-10 rounded-full bg-primary text-white shadow-lg flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 hover:bg-primary/90 z-20">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"/></svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
